# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: Vite + React 18 + TypeScript + Tailwind CSS v4 + shadcn/ui (frontend)
               Fastify + TypeScript + Supabase (backend, in backend/)
  Architecture: SPA frontend, REST API backend, Supabase PostgreSQL
  Testing: No test runner detected (typecheck-only via tsc --noEmit)
  Style: TypeScript strict mode, ES Modules, shadcn/ui Radix components

strict_tdd: false

testing:
  strict_tdd: false
  detected: 2026-06-17
  runner:
    command: null
    framework: NOT_FOUND
  layers:
    unit: { available: false, tool: null }
    integration: { available: false, tool: null }
    e2e: { available: false, tool: null }
  coverage: { available: false, command: null }
  quality:
    linter: { available: false, command: null }
    type_checker: { available: true, command: "tsc --noEmit" }
    formatter: { available: false, command: null }

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules (frontend/backend/shared)
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
  verify:
    - Run tests if test infrastructure exists (currently: none)
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)
